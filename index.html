<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Al Rooliya Trading Est.</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    /* ------ Reset & Base ------ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: url("https://images.unsplash.com/photo-1614852624575-7f5e2bf8cc99?q=80") 
                  no-repeat center center fixed;
      background-size: cover;
      line-height: 1.4;
      color: #333;
    }
    h1,h2,h4 { margin-bottom: .5em; }
    section { 
      background: rgba(255,255,255,0.85); 
      border-radius: 8px; 
      padding:20px; 
      margin:20px auto; 
      max-width:800px; 
    }
    footer { text-align:center; padding:10px; color:#555; }

    /* ------ Header ------ */
    header{ text-align:center; padding:20px }
    header img{ max-width:200px; margin-bottom:10px }
    header h1{ color:#f72e21; font-size:1.8rem }
    header h4{ color:#ff9b24; font-size:1rem }

    /* ------ Language Switch ------ */
    #lang-switch {
      position: fixed;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }
    #lang-switch button{
      display: inline-block;
      height: 28px;
      line-height: 28px;
      padding: 0 12px;
      white-space: nowrap;
      font-size: 1rem;
      border: none;
      background: #f72e21;
      color: #fff;
      border-radius: 4px;
      cursor: pointer;
      transition: background .2s;
    }
    #lang-switch button:hover { background: #ff9b24 }

    /* ------ Services ------ */
    .services ul{ list-style:none }
    .services li::before{ content:"• "; color:#f72e21; font-weight:bold }
    .services li{ margin:5px 0 }

    /* ------ Location Map Override ------ */
    .location iframe {
      width: 100% !important;
      height: 450px !important;
      border: 0 !important;
      display: block;
      margin: 0 auto;
    }

    /* ------ Form ------ */
    .appointment label{ display:block; margin:10px 0 5px; font-weight:bold }
    .appointment label small { font-weight:normal; color:#555; }
    .appointment select,
    .appointment input,
    .appointment textarea,
    .appointment button{
      width:100%; padding:8px; margin-bottom:10px;
      border:1px solid #ccc; border-radius:4px; font-size:1rem
    }
    .appointment button{
      background:#f72e21; color:#fff; cursor:pointer; transition:background .2s
    }
    .appointment button.accent{ background:#ff9b24 }
    .appointment button:hover{ opacity:.9 }

    /* hide/show */
    .hidden{ display:none }
    .lang{ display:none }
    .lang.en.active{ display:inline }
    .lang.ar.active{ display:inline }

    /* feedback */
    #error-msg{ color:red; margin-top:10px }
  </style>
</head>
<body>

  <!-- Language -->
  <div id="lang-switch">
    <button data-lang="en">English</button>
    <button data-lang="ar">العربية</button>
  </div>

  <!-- Header -->
  <header>
    <img src="Al Rooliya Logo Transparent.png" alt="Logo" />
    <h1>
      <span class="lang en active">Al Rooliya Trading Est.</span>
      <span class="lang ar">مؤسسة الرولية للتجارة</span>
    </h1>
    <h4>
      <span class="lang en active">Trusted Hands, Timeless Care.</span>
      <span class="lang ar">أيدٍ أمينة، عناية مستمرة.</span>
    </h4>
  </header>

  <!-- Services -->
  <section class="services">
    <h2>
      <span class="lang en active">Services</span>
      <span class="lang ar">الخدمات</span>
    </h2>
    <ul id="services-list"></ul>
  </section>

  <!-- Location -->
  <section class="location">
    <h2>
      <span class="lang en active">Location</span>
      <span class="lang ar">الموقع</span>
    </h2>
    <iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3666.989560149332!2d58.87434627491798!3d23.207051079044835!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3e91b1ca533a0345%3A0x3abd4f3b6e0af1ad!2zQWwgUm9vbGl5YSBUcmFkaW5nIEVzdC4gKEJhYnUgR2FyYWdlKSAtINmF2KTYs9iz2Kkg2KfZhNix2YjZhNmK2Kkg2YTZhNiq2KzYp9ix2KkgKNio2KfYqNmIINmD2LHYp9isKQ!5e0!3m2!1sen!2sie!4v1745838843846!5m2!1sen!2sie" 
      width="600" height="450" 
      allowfullscreen 
      loading="lazy" 
      referrerpolicy="no-referrer-when-downgrade">
    </iframe>
  </section>

  <!-- Appointment -->
  <section class="appointment">
    <h2>
      <span class="lang en active">Book an Appointment</span>
      <span class="lang ar">حجز موعد</span>
    </h2>

    <!-- Step 1 -->
    <label>
      <span class="lang en active">Select Category</span>
      <span class="lang ar">اختر الفئة</span>
    </label>
    <select id="category">
      <option value="vehicle" data-en="Vehicle" data-ar="المركبات">Vehicle</option>
      <option value="appliance" data-en="Industrial Appliance" data-ar="الأجهزة الصناعية">Industrial Appliance</option>
    </select>
    <button id="apply-btn">
      <span class="lang en active">Apply</span>
      <span class="lang ar">تطبيق</span>
    </button>

    <!-- Step 2 -->
    <div id="form-fields" class="hidden">
      <label>
        <span class="lang en active">Service Requested</span>
        <span class="lang ar">الخدمة المطلوبة</span>
      </label>
      <select id="service"></select>

      <label>
        <span class="lang en active">Customer Name</span>
        <span class="lang ar">اسم العميل</span>
      </label>
      <input type="text" id="name" />

      <label>
        <span class="lang en active">Phone Number <small>(8 digits)</small></span>
        <span class="lang ar">رقم الهاتف <small>(8 أرقام)</small></span>
      </label>
      <input type="tel" id="phone" pattern="\d{8}" placeholder="12345678" />

      <div id="plate-group" class="hidden">
        <label>
          <span class="lang en active">Vehicle Plate Number <small>(optional)</small></span>
          <span class="lang ar">رقم لوحة المركبة <small>(اختياري)</small></span>
        </label>
        <input type="text" id="plate" />
      </div>

      <div id="bm-group">
        <label id="bm-label">
          <span class="lang en active">Make &amp; Model <small>(optional)</small></span>
          <span class="lang ar">النوع والموديل <small>(اختياري)</small></span>
        </label>
        <input type="text" id="bm" />
      </div>

      <div id="typ-group" class="hidden">
        <label>
          <span class="lang en active">Appliance Type <small>(optional)</small></span>
          <span class="lang ar">نوع الجهاز الصناعي <small>(اختياري)</small></span>
        </label>
        <input type="text" id="typ" />
      </div>

      <label>
        <span class="lang en active">Preferred Date</span>
        <span class="lang ar">التاريخ المفضل</span>
      </label>
      <input type="date" id="date" />

      <label>
        <span class="lang en active">Preferred Time</span>
        <span class="lang ar">الوقت المفضل</span>
      </label>
      <input type="time" id="time" value="10:00" />

      <label>
        <span class="lang en active">Urgency Level</span>
        <span class="lang ar">درجة الأهمية</span>
      </label>
      <select id="urgency">
        <option value="Normal" data-en="Normal" data-ar="عادي">Normal</option>
        <option value="Urgent" data-en="Urgent" data-ar="عاجل">Urgent</option>
      </select>

      <label>
        <span class="lang en active">Preferred Contact Method</span>
        <span class="lang ar">طريقة الاتصال المفضلة</span>
      </label>
      <select id="contact">
        <option value="WhatsApp" data-en="WhatsApp" data-ar="واتساب">WhatsApp</option>
        <option value="Phone Call" data-en="Phone Call" data-ar="اتصال هاتفي">Phone Call</option>
      </select>

      <label>
        <span class="lang en active">Problem Description <small>(optional)</small></span>
        <span class="lang ar">وصف المشكلة <small>(اختياري)</small></span>
      </label>
      <textarea id="problem" rows="3"></textarea>

      <button id="book-btn" class="accent">
        <span class="lang en active">Book Now</span>
        <span class="lang ar">احجز الآن</span>
      </button>
      <button id="clear-btn">
        <span class="lang en active">Clear Form</span>
        <span class="lang ar">مسح النموذج</span>
      </button>

      <div id="error-msg"></div>
    </div>
  </section>

  <footer>© 2025 Al Rooliya Trading Est.</footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const WHATSAPP_NUMBER = '96879638955';
      let currentLang = 'en';

      const SERVICES = [
        {key:"brakes",en:"Brake service & repair",ar:"خدمة وإصلاح الفرامل"},
        {key:"oil",en:"Oil change",ar:"تغيير الزيت"},
        {key:"suspension",en:"Steering & suspension repair",ar:"إصلاح التوجيه والتعليق"},
        {key:"tyres",en:"Tyres",ar:"الإطارات"},
        {key:"diagnostic",en:"Vehicle engine diagnostic",ar:"تشخيص محرك المركبة"},
        {key:"filters",en:"Air & cabin filter replacement",ar:"استبدال فلاتر الهواء والمقصورة"},
        {key:"exhaust",en:"Exhaust repair",ar:"إصلاح العادم"},
        {key:"denting",en:"Denting & painting",ar:"سمكرة ودهان"},
        {key:"lathe",en:"Lathe work",ar:"خراطة"},
        {key:"disc",en:"Brake disc resurfacing",ar:"تسوية أقراص الفرامل"},
        {key:"welding",en:"Welding",ar:"لحام"},
        {key:"transmission",en:"Manual transmission repair",ar:"إصلاح ناقل الحركة اليدوي"},
        {key:"appliance",en:"Industrial appliance repair & maintenance",ar:"صيانة وإصلاح المعدات الصناعية"}
      ];

      // Elements
      const langBtns   = document.querySelectorAll('#lang-switch button');
      const servicesUl = document.getElementById('services-list');
      const applyBtn   = document.getElementById('apply-btn');
      const clearBtn   = document.getElementById('clear-btn');
      const bookBtn    = document.getElementById('book-btn');
      const formFields = document.getElementById('form-fields');
      const catSelect  = document.getElementById('category');
      const svcSelect  = document.getElementById('service');
      const plateGrp   = document.getElementById('plate-group');
      const bmLabel    = document.getElementById('bm-label');
      const typGrp     = document.getElementById('typ-group');
      const dateInput  = document.getElementById('date');
      const timeInput  = document.getElementById('time');
      const urgencySel = document.getElementById('urgency');
      const contactSel = document.getElementById('contact');
      const problemTA  = document.getElementById('problem');
      const errorMsg   = document.getElementById('error-msg');

      function showLang(lang){
        currentLang = lang;
        document.querySelectorAll('.lang').forEach(el=>el.classList.remove('active'));
        document.querySelectorAll(`.lang.${lang}`).forEach(el=>el.classList.add('active'));
        document.querySelectorAll('#category option').forEach(opt=>opt.textContent=opt.dataset[lang]);
        document.querySelectorAll('#urgency option').forEach(opt=>opt.textContent=opt.dataset[lang]);
        document.querySelectorAll('#contact option').forEach(opt=>opt.textContent=opt.dataset[lang]);
        populateServiceOptions();
      }

      function populateServicesSection(){
        servicesUl.innerHTML = '';
        SERVICES.forEach(s => {
          const li = document.createElement('li');
          li.innerHTML = `<span class="lang en active">${s.en}</span><span class="lang ar">${s.ar}</span>`;
          servicesUl.appendChild(li);
        });
      }

      function populateServiceOptions(){
        const isApp = catSelect.value==='appliance';
        svcSelect.innerHTML = '';
        SERVICES.filter(s => (s.key==='appliance')===isApp).forEach(s => {
          const o = document.createElement('option');
          o.value = s.key;
          o.textContent = currentLang==='en'? s.en : s.ar;
          svcSelect.appendChild(o);
        });
        if(isApp){
          plateGrp.classList.add('hidden');
          bmLabel.querySelector('.en').innerHTML = 'Make &amp; Model <small>(optional)</small>';
          bmLabel.querySelector('.ar').innerHTML = 'النوع والموديل <small>(اختياري)</small>';
          typGrp.classList.remove('hidden');
        } else {
          plateGrp.classList.remove('hidden');
          bmLabel.querySelector('.en').innerHTML = 'Make &amp; Model <small>(optional)</small>';
          bmLabel.querySelector('.ar').innerHTML = 'النوع والموديل <small>(اختياري)</small>';
          typGrp.classList.add('hidden');
        }
      }

      // init
      dateInput.min = new Date().toISOString().split('T')[0];
      showLang('en');
      populateServicesSection();

      applyBtn.addEventListener('click', ()=>{
        formFields.classList.remove('hidden');
        errorMsg.textContent = '';
        populateServiceOptions();
      });

      clearBtn.addEventListener('click', () => {
        // hide the form again
        formFields.classList.add('hidden');
        // clear any error
        errorMsg.textContent = '';
        // reset category (will also reset which fields show)
        catSelect.value = 'vehicle';
        // now clear all inputs
        svcSelect.innerHTML = '';
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('plate').value = '';
        document.getElementById('bm').value = '';
        document.getElementById('typ').value = '';
        dateInput.value = '';
        timeInput.value = '10:00';
        urgencySel.value = 'Normal';
        contactSel.value = 'WhatsApp';
        problemTA.value = '';
      });

      bookBtn.addEventListener('click', ()=>{
        errorMsg.textContent = '';
        const missing = [];
        if(!svcSelect.value) missing.push(currentLang==='en'?'Service':'الخدمة');
        if(!document.getElementById('name').value.trim()) missing.push(currentLang==='en'?'Name':'الاسم');
        const ph = document.getElementById('phone').value.trim();
        if(!/^\d{8}$/.test(ph)) missing.push(currentLang==='en'?'Phone (8 digits)':'الهاتف (8 أرقام)');
        if(!dateInput.value) missing.push(currentLang==='en'?'Date':'التاريخ');
        if(!timeInput.value) missing.push(currentLang==='en'?'Time':'الوقت');
        if(!urgencySel.value) missing.push(currentLang==='en'?'Urgency':'درجة الأهمية');
        if(!contactSel.value) missing.push(currentLang==='en'?'Contact method':'طريقة الاتصال');
        if(missing.length){
          errorMsg.textContent = (currentLang==='en'?'Please fill/fix: ':'يرجى ملء/تصحيح: ')+ missing.join(', ');
          return;
        }

        const isApp = catSelect.value==='appliance';
        const lines = [];
        const svcText = svcSelect.options[svcSelect.selectedIndex].text;

        if(isApp){
          lines.push(currentLang==='en'?'Hello,':'مرحبًا،');
          lines.push(currentLang==='en'?'I would like to book a service appointment for an industrial appliance.':'أرغب في حجز موعد لصيانة جهاز صناعي.');
          lines.push('');
          lines.push((currentLang==='en'?'Service Requested: ':'الخدمة المطلوبة: ')+svcText);
          const typ = document.getElementById('typ').value.trim();
          if(typ) lines.push((currentLang==='en'?'Appliance Type: ':'نوع الجهاز: ')+typ);
          const bm = document.getElementById('bm').value.trim();
          if(bm) lines.push((currentLang==='en'?'Make & Model: ':'النوع والموديل: ')+bm);
        } else {
          lines.push(currentLang==='en'?'Hello,':'مرحبًا،');
          lines.push(currentLang==='en'?'I would like to schedule an appointment for my vehicle.':'أرغب في حجز موعد لمركبتي.');
          lines.push('');
          lines.push((currentLang==='en'?'Service Requested: ':'الخدمة المطلوبة: ')+svcText);
          const bm = document.getElementById('bm').value.trim();
          if(bm) lines.push((currentLang==='en'?'Vehicle Make & Model: ':'نوع وموديل المركبة: ')+bm);
          const plate = document.getElementById('plate').value.trim();
          if(plate) lines.push((currentLang==='en'?'Vehicle Plate Number: ':'رقم لوحة المركبة: ')+plate);
        }

        lines.push((currentLang==='en'?'Preferred Date: ':'التاريخ المفضل: ')+dateInput.value);
        lines.push((currentLang==='en'?'Preferred Time: ':'الوقت المفضل: ')+timeInput.value);
        lines.push((currentLang==='en'?'Urgency Level: ':'درجة الأهمية: ')+urgencySel.value);
        lines.push((currentLang==='en'?'Preferred Contact Method: ':'طريقة الاتصال المفضلة: ')+contactSel.value);

        const prob = problemTA.value.trim();
        if(prob) lines.push((currentLang==='en'?'Problem Description: ':'وصف المشكلة: ')+prob);

        lines.push((currentLang==='en'?'Customer Name: ':'اسم العميل: ')+
          document.getElementById('name').value.trim());
        lines.push((currentLang==='en'?'Phone Number: ':'رقم الهاتف: ')+ph);
        lines.push('');
        lines.push(currentLang==='en'?'Thank you for your assistance.':'شكرًا لكم على تعاونكم.');
        lines.push('---');
        lines.push(
          currentLang==='en'
            ? '(This message was generated via the Al Rooliya Website Appointment System.)'
            : '(تم إنشاء هذه الرسالة عبر نظام حجز المواعيد بموقع مؤسسة الرولية.)'
        );

        // open WhatsApp immediately
        const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(lines.join('\n\n'))}`;
        window.open(url, '_blank');
      });

      langBtns.forEach(btn=>btn.addEventListener('click', ()=>showLang(btn.dataset.lang)));
    });
  </script>
</body>
</html>
